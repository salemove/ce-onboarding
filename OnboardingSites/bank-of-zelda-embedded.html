<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Loan Application</title>
    
    <style>
        body { 
            margin: 0; 
            font-family: 'Georgia', serif; 
            background-color: #f4ebd0; 
            color: #2c3e50; 
        }
        .form-wrapper { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 40px; 
            background-color: #fff; 
            border: 2px solid #b8860b; 
            border-radius: 8px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
        }
        h2 { 
            color: #1d4e28; 
            text-align: center; 
            margin-top: 0; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #1d4e28; 
        }
        input[type="text"], input[type="number"], select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: 'Georgia', serif; 
            font-size: 1em;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #b8860b;
            box-shadow: 0 0 5px rgba(184, 134, 11, 0.5);
        }
        .btn { 
            display: block; 
            width: 100%; 
            background-color: #1d4e28; 
            color: #ffd700; 
            padding: 15px; 
            border: none; 
            font-size: 1.2em; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: #2c5e3a; }
        .security-badge { 
            text-align: center; 
            font-size: 0.85em; 
            color: #7f8c8d; 
            margin-top: 20px; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="form-wrapper">
        <h2>Apply for a Royal Loan</h2>
        
        <form onsubmit="event.preventDefault(); alert('Application sent via Cucco to Princess Zelda for review!');">
            <div class="form-group">
                <label for="heroName">Applicant's Full Name (or alias):</label>
                <input type="text" id="heroName" placeholder="e.g., Link of Kokiri Forest" required>
            </div>
            
            <div class="form-group">
                <label for="rupees">Loan Amount Requested (Rupees):</label>
                <input type="number" id="rupees" placeholder="e.g., 500" required>
            </div>
            
            <div class="form-group">
                <label for="collateral">Collateral Item Provided:</label>
                <select id="collateral">
                    <option value="bottle">Empty Glass Bottle (High Value)</option>
                    <option value="shield">Hylian Shield</option>
                    <option value="horse">Epona (Registration papers required)</option>
                    <option value="gems">Assorted Ruby / Sapphire / Topaz</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="quest">Purpose of Loan (Current Quest):</label>
                <input type="text" id="quest" placeholder="e.g., Defeating Ganon, buying Bombchus" required>
            </div>
            
            <button type="submit" class="btn">Submit Application</button>
            <p class="security-badge">🔒 Secured by Sheikah Slate Encryption. Third-party viewing strictly prohibited.</p>
        </form>
    </div>

</body>
</html>
